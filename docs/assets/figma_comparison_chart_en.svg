<svg viewBox="0 0 1080 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1080" height="600" fill="#fafafa"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1080" height="80" fill="#1a1a1a"/>
  <text x="540" y="45" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">
    🚨 Open Source Wrapping Scam vs OSS Liberation Movement
  </text>
  
  <!-- Column Headers -->
  <rect x="40" y="100" width="480" height="60" fill="#ff4757" rx="8"/>
  <text x="280" y="140" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">
    Figma Official (Paywall)
  </text>
  
  <rect x="560" y="100" width="480" height="60" fill="#2ed573" rx="8"/>
  <text x="800" y="140" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">
    figma-mcp-free (Liberation)
  </text>
  
  <!-- Row 1: Core Technology -->
  <text x="20" y="200" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Core Tech</text>
  <rect x="120" y="180" width="400" height="40" fill="#ffebee" stroke="#ff4757" stroke-width="2" rx="4"/>
  <text x="320" y="205" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">
    MCP (Free Open Standard) + Figma API
  </text>
  
  <rect x="560" y="180" width="480" height="40" fill="#e8f5e8" stroke="#2ed573" stroke-width="2" rx="4"/>
  <text x="800" y="205" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">
    MCP (Free Open Standard) + Figma API
  </text>
  
  <!-- Row 2: Pricing -->
  <text x="20" y="260" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Pricing</text>
  <rect x="120" y="240" width="400" height="40" fill="#ffebee" stroke="#ff4757" stroke-width="2" rx="4"/>
  <text x="320" y="265" font-family="Arial, sans-serif" font-size="16" fill="#d63031" font-weight="bold" text-anchor="middle">
    💸 $12/mo~ (Dev/Full seat required)
  </text>
  
  <rect x="560" y="240" width="480" height="40" fill="#e8f5e8" stroke="#2ed573" stroke-width="2" rx="4"/>
  <text x="800" y="265" font-family="Arial, sans-serif" font-size="16" fill="#00b894" font-weight="bold" text-anchor="middle">
    💚 Completely Free (Personal Token only)
  </text>
  
  <!-- Row 3: Features -->
  <text x="20" y="320" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Features</text>
  <rect x="120" y="300" width="400" height="60" fill="#ffebee" stroke="#ff4757" stroke-width="2" rx="4"/>
  <text x="320" y="325" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">
    ✅ Design Token Extraction
  </text>
  <text x="320" y="345" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">
    ✅ Code Generation (Limited)
  </text>
  
  <rect x="560" y="300" width="480" height="60" fill="#e8f5e8" stroke="#2ed573" stroke-width="2" rx="4"/>
  <text x="800" y="320" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">
    ✅ Full Design Token Export ✅ Complete Code Gen
  </text>
  <text x="800" y="340" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">
    ✅ Multi-Framework Support ✅ AI Integration Optimized
  </text>
  
  <!-- Row 4: Limitations -->
  <text x="20" y="400" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Limitations</text>
  <rect x="120" y="380" width="400" height="60" fill="#ffebee" stroke="#ff4757" stroke-width="2" rx="4"/>
  <text x="320" y="405" font-family="Arial, sans-serif" font-size="14" fill="#d63031" text-anchor="middle">
    ❌ Desktop App Only
  </text>
  <text x="320" y="425" font-family="Arial, sans-serif" font-size="14" fill="#d63031" text-anchor="middle">
