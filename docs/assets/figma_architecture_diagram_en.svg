  </text>
  
  <!-- MCP Server -->
  <rect x="450" y="130" width="110" height="60" fill="#55efc4" rx="6"/>
  <text x="505" y="150" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">
    MCP Server
  </text>
  <text x="505" y="165" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">
    STDIO Protocol
  </text>
  <text x="505" y="180" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">
