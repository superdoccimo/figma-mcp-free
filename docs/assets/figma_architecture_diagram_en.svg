  </text>
  
  <!-- Design Token Generator -->
  <rect x="320" y="210" width="100" height="60" fill="#55efc4" rx="6"/>
  <text x="370" y="230" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">
    Token Gen
  </text>
  <text x="370" y="245" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">
    W3C Standard
  </text>
  <text x="370" y="260" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">
    CSS/Tailwind
  </text>
  
  <!-- Code Generator -->
  <rect x="450" y="210" width="110" height="60" fill="#55efc4" rx="6"/>
  <text x="505" y="230" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">
    Code Gen
  </text>
  <text x="505" y="245" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">
    React/Vue/Svelte
  </text>
  <text x="505" y="260" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">
    TypeScript Support
  </text>
  
  <text x="440" y="300" font-family="Arial, sans-serif" font-size="10" fill="#00b894" text-anchor="middle">
    Open Source
  </text>
  <text x="440" y="315" font-family="Arial, sans-serif" font-size="10" fill="#00b894" text-anchor="middle">
    Free &amp; Unlimited
  </text>
  
  <!-- Arrow 2 -->
  <path d="M 590 200 L 630 200" stroke="#2d3436" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="610" y="190" font-family="Arial, sans-serif" font-size="10" fill="#636e72" text-anchor="middle">MCP</text>
  
  <!-- Right Section: User Environment -->
  <rect x="640" y="60" width="200" height="280" fill="#f8f9fa" stroke="#fd79a8" stroke-width="2" rx="12"/>
  <rect x="650" y="70" width="180" height="40" fill="#fd79a8" rx="6"/>
  <text x="740" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">
