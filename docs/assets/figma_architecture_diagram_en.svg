  </text>
  
  <!-- Claude Code -->
  <rect x="660" y="130" width="160" height="30" fill="#fab1e4" rx="4"/>
  <text x="740" y="150" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">
    Claude Code
  </text>
  
  <!-- Codex -->
  <rect x="660" y="170" width="160" height="30" fill="#fab1e4" rx="4"/>
  <text x="740" y="190" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">
    Claude Codex
  </text>
  
  <!-- Cursor -->
  <rect x="660" y="210" width="160" height="30" fill="#fab1e4" rx="4"/>
  <text x="740" y="230" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">
    Cursor IDE
  </text>
  
  <!-- Local Projects -->
  <rect x="660" y="250" width="160" height="30" fill="#fab1e4" rx="4"/>
  <text x="740" y="270" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">
    Local Projects
  </text>
  
  <text x="740" y="310" font-family="Arial, sans-serif" font-size="10" fill="#fd79a8" text-anchor="middle">
    AI Integration Ready
  </text>
  <text x="740" y="325" font-family="Arial, sans-serif" font-size="10" fill="#fd79a8" text-anchor="middle">
    Works Anywhere
  </text>
  
  <!-- Arrow 3 (Feedback loop) -->
  <path d="M 630 240 L 590 240" stroke="#636e72" stroke-width="1" stroke-dasharray="3,3" fill="none" marker-end="url(#arrowhead-small)"/>
  <text x="610" y="255" font-family="Arial, sans-serif" font-size="9" fill="#636e72" text-anchor="middle">feedback</text>
  
  <!-- Bottom banner -->
  <rect x="40" y="360" width="800" height="30" fill="#2f3542" rx="6"/>
  <text x="440" y="380" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">
    Personal Access Token → Complete Dev Mode+ features for FREE
  </text>
</svg>